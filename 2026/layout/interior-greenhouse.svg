<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 68" width="920" height="680">
  <title>Greenhouse interior - 6 x 4 ft</title>
  <rect width="92" height="68" fill="#f8fafc"/>
  <text x="46" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="3.2" font-weight="bold" fill="#0f172a">Greenhouse | Zone 1 | 6 ft x 4 ft interior (inches)</text>
  <g id="gh-interior">
    <rect x="10" y="10" width="72" height="48" fill="#ecfdf5" stroke="#166534" stroke-width="0.55"/>
    <text x="46" y="8.5" text-anchor="middle" font-family="Arial" font-size="2.2" fill="#166534">N / back wall</text>
    <line x1="10" y1="22" x2="82" y2="22" stroke="#86efac" stroke-width="0.25" stroke-dasharray="2 2"/>
    <text x="84" y="24" font-family="Arial" font-size="1.8" fill="#64748b">train tomato</text>
  </g>
  <g id="plants" font-family="Arial, Helvetica, sans-serif" font-weight="bold">
    <rect x="40" y="12" width="12" height="8" fill="none" stroke="#15803d" stroke-width="0.35"/>
    <text x="46" y="17.5" text-anchor="middle" font-size="2.4" fill="#14532d">Tom</text>
    <circle cx="28" cy="32" r="3.5" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/><text x="28" y="33.5" text-anchor="middle" font-size="2" fill="#713f12">P1</text>
    <circle cx="46" cy="32" r="3.5" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/><text x="46" y="33.5" text-anchor="middle" font-size="2" fill="#713f12">P2</text>
    <circle cx="64" cy="32" r="3.2" fill="#fed7aa" stroke="#ea580c" stroke-width="0.4"/><text x="64" y="33.3" text-anchor="middle" font-size="1.8" fill="#9a3412">Jal</text>
    <ellipse cx="34" cy="48" rx="10" ry="6" fill="#fcd34d" stroke="#d97706" stroke-width="0.35" opacity="0.9"/><text x="34" y="49.5" text-anchor="middle" font-size="1.8" fill="#78350f">SP</text>
    <ellipse cx="58" cy="48" rx="10" ry="6" fill="#fcd34d" stroke="#d97706" stroke-width="0.35" opacity="0.9"/><text x="58" y="49.5" text-anchor="middle" font-size="1.8" fill="#78350f">SP</text>
    <text x="46" y="62" text-anchor="middle" font-size="1.9" fill="#64748b" font-weight="normal">Cherry tomato vertical | peppers | jalapeno | sweet potato spread (schematic)</text>
  </g>
  <g id="irrigation" fill="none">
    <text x="10" y="66" font-family="Arial" font-size="2" fill="#15803d" font-weight="bold">1/4 in | Zone 1 timer | 1-2 GPH per plant | daily/near-daily peak (PLAN)</text>
    <polyline points="12,14 78,14" stroke="#78350f" stroke-width="0.55"/>
    <line x1="46" y1="14" x2="46" y2="20" stroke="#78350f" stroke-width="0.45"/>
    <line x1="28" y1="14" x2="28" y2="28.5" stroke="#78350f" stroke-width="0.45"/><line x1="46" y1="14" x2="46" y2="28.5" stroke="#78350f" stroke-width="0.45"/><line x1="64" y1="14" x2="64" y2="28.5" stroke="#78350f" stroke-width="0.45"/>
    <line x1="34" y1="14" x2="34" y2="42" stroke="#78350f" stroke-width="0.4"/><line x1="58" y1="14" x2="58" y2="42" stroke="#78350f" stroke-width="0.4"/>
    <circle cx="12" cy="14" r="1.8" fill="#15803d" stroke="#14532d" stroke-width="0.3"/><text x="12" y="15.2" text-anchor="middle" font-size="1.5" fill="#fff" font-weight="bold">M</text>
    <circle cx="46" cy="20" r="1.15" fill="#22c55e" stroke="#166534" stroke-width="0.25"/>
    <circle cx="28" cy="28.5" r="1.15" fill="#22c55e" stroke="#166534" stroke-width="0.25"/>
    <circle cx="46" cy="28.5" r="1.15" fill="#22c55e" stroke="#166534" stroke-width="0.25"/>
    <circle cx="64" cy="28.5" r="1.15" fill="#22c55e" stroke="#166534" stroke-width="0.25"/>
    <circle cx="34" cy="42" r="1.15" fill="#22c55e" stroke="#166534" stroke-width="0.25"/>
    <circle cx="58" cy="42" r="1.15" fill="#22c55e" stroke="#166534" stroke-width="0.25"/>
  </g>
</svg>
