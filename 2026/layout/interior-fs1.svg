<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 56" width="920" height="560">
  <title>FS1 interior - onions (+ oregano TBD)</title>
  <rect width="92" height="56" fill="#f8fafc"/>
  <text x="46" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="3.2" font-weight="bold" fill="#0f172a">FS1 full sun | Zone 2 | 6 ft x 3 ft (inches)</text>
  <g id="bed-interior">
    <rect x="10" y="10" width="72" height="36" fill="#e8d4c4" stroke="#44403c" stroke-width="0.5"/>
    <text x="46" y="8.5" text-anchor="middle" font-family="Arial" font-size="2.2" fill="#57534e">N (fence)</text>
  </g>
  <g id="plants" font-family="Arial, Helvetica, sans-serif" font-size="2" fill="#365314">
    <!-- 3 rows x 5 cols = 15 positions (plan 12-15 yellow + green onions) -->
    <g id="onion-grid">
      <circle cx="19" cy="20" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="31" cy="20" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="43" cy="20" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="55" cy="20" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="67" cy="20" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/>
      <circle cx="19" cy="28" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="31" cy="28" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="43" cy="28" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="55" cy="28" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/><circle cx="67" cy="28" r="1.8" fill="#fef08a" stroke="#ca8a04" stroke-width="0.3"/>
      <circle cx="19" cy="36" r="1.8" fill="#d9f99d" stroke="#65a30d" stroke-width="0.3"/><circle cx="31" cy="36" r="1.8" fill="#d9f99d" stroke="#65a30d" stroke-width="0.3"/><circle cx="43" cy="36" r="1.8" fill="#d9f99d" stroke="#65a30d" stroke-width="0.3"/><circle cx="55" cy="36" r="1.8" fill="#d9f99d" stroke="#65a30d" stroke-width="0.3"/><circle cx="67" cy="36" r="1.8" fill="#d9f99d" stroke="#65a30d" stroke-width="0.3"/>
    </g>
    <text x="46" y="44" text-anchor="middle" font-size="1.8" fill="#64748b">Yellow (rows 1-2) + green (row 3) schematic | Oregano TBD</text>
  </g>
  <g id="irrigation" fill="none">
    <text x="10" y="52" font-family="Arial" font-size="2.2" fill="#1d4ed8" font-weight="bold">1/4 in | Zone 2 | 1/2 GPH per onion position</text>
    <polyline points="12,12 78,12" stroke="#78350f" stroke-width="0.6"/>
    <line x1="19" y1="12" x2="19" y2="18.2" stroke="#78350f" stroke-width="0.35"/><line x1="31" y1="12" x2="31" y2="18.2" stroke="#78350f" stroke-width="0.35"/><line x1="43" y1="12" x2="43" y2="18.2" stroke="#78350f" stroke-width="0.35"/><line x1="55" y1="12" x2="55" y2="18.2" stroke="#78350f" stroke-width="0.35"/><line x1="67" y1="12" x2="67" y2="18.2" stroke="#78350f" stroke-width="0.35"/>
    <line x1="19" y1="12" x2="19" y2="26.2" stroke="#78350f" stroke-width="0.35"/><line x1="31" y1="12" x2="31" y2="26.2" stroke="#78350f" stroke-width="0.35"/><line x1="43" y1="12" x2="43" y2="26.2" stroke="#78350f" stroke-width="0.35"/><line x1="55" y1="12" x2="55" y2="26.2" stroke="#78350f" stroke-width="0.35"/><line x1="67" y1="12" x2="67" y2="26.2" stroke="#78350f" stroke-width="0.35"/>
    <line x1="19" y1="12" x2="19" y2="34.2" stroke="#78350f" stroke-width="0.35"/><line x1="31" y1="12" x2="31" y2="34.2" stroke="#78350f" stroke-width="0.35"/><line x1="43" y1="12" x2="43" y2="34.2" stroke="#78350f" stroke-width="0.35"/><line x1="55" y1="12" x2="55" y2="34.2" stroke="#78350f" stroke-width="0.35"/><line x1="67" y1="12" x2="67" y2="34.2" stroke="#78350f" stroke-width="0.35"/>
    <circle cx="12" cy="12" r="1.8" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="0.3"/>
    <text x="12" y="13.2" text-anchor="middle" font-size="1.6" fill="#fff" font-weight="bold">M</text>
    <g fill="#38bdf8" stroke="#0284c7" stroke-width="0.2">
      <circle cx="19" cy="18.2" r="0.9"/><circle cx="31" cy="18.2" r="0.9"/><circle cx="43" cy="18.2" r="0.9"/><circle cx="55" cy="18.2" r="0.9"/><circle cx="67" cy="18.2" r="0.9"/>
      <circle cx="19" cy="26.2" r="0.9"/><circle cx="31" cy="26.2" r="0.9"/><circle cx="43" cy="26.2" r="0.9"/><circle cx="55" cy="26.2" r="0.9"/><circle cx="67" cy="26.2" r="0.9"/>
      <circle cx="19" cy="34.2" r="0.9"/><circle cx="31" cy="34.2" r="0.9"/><circle cx="43" cy="34.2" r="0.9"/><circle cx="55" cy="34.2" r="0.9"/><circle cx="67" cy="34.2" r="0.9"/>
    </g>
  </g>
</svg>
